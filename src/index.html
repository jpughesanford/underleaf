<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 'wasm-unsafe-eval' lets the spell checker (hunspell-asm) compile its
         WebAssembly WITHOUT enabling general 'unsafe-eval'; data: in connect-src
         lets it read its inlined wasm binary. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' blob: data:; worker-src blob:;" />
    <title>Underleaf</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./renderer/main.tsx"></script>
  </body>
</html>
